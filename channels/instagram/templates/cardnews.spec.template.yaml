# Cardnews spec template (YAML)
#
# - Put a Korean-capable .ttf in `assets/fonts/` and set `font.path`,
#   or set env var JUSTSELL_FONT_PATH.

canvas:
  width: 1080
  height: 1350

theme:
  background:
    kind: solid
    color: "#FFFFFF"
  accent_primary: "#2563EB"
  accent_secondary: "#0F172A"
  card:
    fill: "rgba(255,255,255,0.95)"
    border: "rgba(15,23,42,0.14)"
    radius: 40
  text:
    title: "#0F172A"
    body: "#0F172A"
    dim: "#475569"

brand:
  name: "{BRAND_NAME}"
  contact: "{CONTACT}"

font:
  path: "" # e.g. assets/fonts/Pretendard-Regular.ttf
  title_size: 84
  body_size: 46
  footer_size: 32

layout:
  padding: 88
  card_padding: 72
  line_spacing: 14
  bullet_prefix: "" # keep empty for cardnews vibe
  show_slide_number: false # true for internal review drafts

slides:
  - title: "{SLIDE_1_TITLE}"
    body:
      - "{LINE_1}"
      - "{LINE_2}"
      - "{LINE_3}"
    footer: "{BRAND_OR_CTA}"
